{% extends "lmsn/layout.html" %}
{% load static %}



{% block content %}
<div class="breadcrumb_section bg_gray page-title-mini">
    <div class="container">
        <div class="row align-items-center">
            <div class="col-md-6">
                <div class="page-title">
                    <h1>{{ category.title }}</h1>
                </div>
            </div>
            <div class="col-md-6">
                <ol class="breadcrumb justify-content-md-end">
                    <li class="breadcrumb-item"><a href="{% url 'lmsn:index' %}">Home</a></li>
                    <li class="breadcrumb-item active">{{ category.title }}</li>
                </ol>
            </div>
        </div>
    </div>
</div>
<div class="main_content">
    <div class="section">
        <div class="container">
            <div class="row">
                <div class="col-12">
                    <div class="term_conditions">
                        {% for terms in termsofuse %}
                            <h6>{{ policy.title }}</h6>
                            <p>{{ policy.content|safe }}</p>
                        {% empty %}
                            <p>No Terms of Use information found.</p>
                        {% endfor %}
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
