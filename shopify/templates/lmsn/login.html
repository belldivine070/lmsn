{% extends "lmsn/layout.html" %}
{% load static %}


{% block content %}

<style>
    .password-container {
        position: relative;
    }
    
    input[type="text"], 
    input[type="password"], 
    .password-container input { 
        width: 100%; 
        padding: 12px 15px; /* Larger tap targets for mobile */
        border: 1px solid #ddd; 
        border-radius: 8px; 
        box-sizing: border-box; 
        font-size: 16px; /* Prevents iOS zoom on input focus */
        transition: border-color 0.3s;
    }

    input:focus {
        outline: none;
        border-color: #3498db;
        ring: 2px solid #3498db;
    }
    
    .toggle-password {
        position: absolute;
        top: 50%;
        right: 12px;
        transform: translateY(-50%);
        cursor: pointer;
        color: #888;
        padding: 5px; /* Bigger hit area for thumbs */
    }

    
    .alert-danger {
        background-color: #f8d7da;
        color: #721c24;
        padding: 12px;
        border-radius: 8px;
        margin-bottom: 20px;
        font-size: 14px;
        border: 1px solid #f5c6cb;
    }

</style>

<!-- START MAIN CONTENT -->
<div class="main_content">

<!-- START LOGIN SECTION -->
<div class="login_register_wrap section">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-xl-6 col-md-10">
                <div class="login_wrap">
            		<div class="padding_eight_all bg-white">
                        <div class="heading_s1">
                            <h3>Login</h3>
                        </div>
                        <form method="post" >
                            {% csrf_token %}

                             {% if form.errors %}
                                <div class="alert alert-danger">
                                    Your username or password was incorrect.
                                </div>
                            {% endif %}
                            
                            <div class="form-group mb-3">
                                <input type="text" required="" class="form-control" name="username" placeholder="Your Email">
                            </div>
                            <div class="form-group mb-3">
                                <input class="form-control" required="" type="password" name="password" placeholder="Password">
                            </div>
                            <div class="login_footer form-group mb-3">
                                <div class="chek-form">
                                    <div class="custome-checkbox">
                                        <input class="form-check-input" type="checkbox" name="checkbox" id="exampleCheckbox1" value="">
                                        <span class="toggle-password" onclick="togglePasswordVisibility()">
                                            <i class="bi bi-eye-slash" id="toggleIcon"></i>
                                        </span>
                                        <label class="form-check-label" for="exampleCheckbox1"><span>Remember me</span></label>
                                    </div>
                                </div>
                                <input type="hidden" name="next" value="{{ next }}" />
                                <a href="{% url 'accounts:password_reset' %}">Forgot password?</a>
                            </div>
                            <div class="form-group mb-3">
                                <button type="submit" class="btn btn-fill-out btn-block" name="login">Log in</button>
                            </div>
                        </form>
                        <div class="different_login">
                            <span> or</span>
                        </div>
                        <ul class="btn-login list_none text-center">
                            <li><a href="#" class="btn btn-facebook"><i class="ion-social-facebook"></i>Facebook</a></li>
                            <li><a href="#" class="btn btn-google"><i class="ion-social-googleplus"></i>Google</a></li>
                        </ul>
                        <div class="form-note text-center">Don't Have an Account? <a href="{% url 'lmsn:usersignup' %}">Sign up now</a></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<!-- END LOGIN SECTION -->

</div>
<!-- END MAIN CONTENT -->

<script>
    function togglePasswordVisibility() {
        var passwordInput = document.getElementById("id_password");
        var toggleIcon = document.getElementById("toggleIcon");

        if (passwordInput.type === "password") {
            passwordInput.type = "text";
            toggleIcon.classList.replace("bi-eye-slash", "bi-eye");
        } else {
            passwordInput.type = "password";
            toggleIcon.classList.replace("bi-eye", "bi-eye-slash");
        }
    }
</script>

{% endblock %}
