{% extends 'layout.html' %}
{% load static %}

{% block content %}
<div class="page-wrapper bg-white" style="min-height: 100vh;">
    <div class="container-fluid pt-2">
        <div class="text-right">
            <a href="{% url 'core:media_library' %}" class="text-danger font-weight-bold small">« Back to Dashboard</a>
        </div>

        <form method="post" enctype="multipart/form-data" class="mt-3">
            {% csrf_token %}
            <div class="row">
                <!-- Left Column: Options -->
                <div class="col-md-6">
                    <h5 class="text-muted mb-3">Upload Options</h5>
                    
                    <div class="form-group">
                        <label class="small font-weight-bold">File Title</label>
                        {{ form.title }} <!-- Ensure your widget has id="title" in forms.py -->
                    </div>

                    <div class="form-group">
                        <label class="text-danger font-weight-bold mb-1">Upload To:</label>
                        {{ form.mediacat }} <!-- Ensure your widget has id="albumid" in forms.py -->
                    </div>

                    <div class="custom-control custom-checkbox mb-4">
                        {{ form.replace_existing }}
                        <label class="custom-control-label text-muted" for="{{ form.replace_existing.id_for_label }}">Replace If Exists</label>
                    </div>

                    <div class="text-center text-md-left">
                        <button type="submit" id="submitMedia" class="btn btn-info btn-lg px-5 shadow-sm" style="background-color: #31d2f2; border: none; border-radius: 4px; color: white;">
                            <i class="fa fa-upload mr-2"></i> Upload
                        </button>
                    </div>
                </div>

                <!-- Right Column: Media Upload -->
                <div class="col-md-6">
                    <div class="card border-0">
                        <div class="card-body p-0">
                            <h5 class="text-muted mb-1">Upload Media</h5>
                            <label>Preview (<span class="font-weight-bold">Accepts Multiple Files</span>)</label>
                            
                            <!-- Dropify only needs this input. It will build the rest of the UI automatically. -->
                            <input type="file" name="file" id="input-file-now-custom-2" class="dropify" 
                                   data-height="300" 
                                   data-max-file-size="45M" 
                                   multiple="multiple" />
                        </div>
                    </div>
                </div>
            </div>
        </form>
    </div>
</div>

<style>
    /* Match your screenshot styling */
    .form-control {
        border: 1px solid #ced4da !important;
        border-radius: 4px !important;
        padding: 10px 15px !important;
    }

    /* Customizing Dropify to match your specific dashed UI */
    .dropify-wrapper {
        border: 2px dashed #ddd !important;
        background-color: #f8f9fa !important;
        border-radius: 4px !important;
    }

    .dropify-wrapper .dropify-message p {
        font-size: 16px !important;
        color: #6c757d !important;
    }

    .custom-control-label { cursor: pointer; }
</style>

<!-- Scripts and CSS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/Dropify/0.2.2/css/dropify.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Dropify/0.2.2/js/dropify.min.js"></script>

<script>
$(document).ready(function() {
    // Initialize Dropify with the custom "No files selected" sub-text from your screenshot
    var drEvent = $('#input-file-now-custom-2').dropify({
        messages: {
            'default': 'Drag And Drop Photo Here or Click To Upload File',
            'replace': 'Drag and drop or click to replace',
            'remove':  'Remove',
            'error':   'Ooops, something wrong happened.'
        },
        tpl: {
            message: '<div class="dropify-message"><span class="file-icon" /> <p>[[value]]</p> <div class="mt-2"><span class="btn btn-sm btn-light border" style="pointer-events:none; font-size:11px;">No files selected.</span></div></div>',
        }
    });

    // Auto-fill Title from Filename if Title is empty
    $("#input-file-now-custom-2").change(function(event){
        var fileInput = document.getElementById('input-file-now-custom-2');   
        if (fileInput.files.length > 0) {
            var fileName = fileInput.files[0].name;
            var titleOnly = fileName.substring(0, fileName.lastIndexOf('.'));
            
            // Note: Ensure your form widget for 'title' has id="title"
            if($('#title').val() == ""){
                $('#title').val(titleOnly);
                
                // Generate Slug
                var slug = titleOnly.replace(/\s+/g, '-').toLowerCase()
                                   .replace(/'/gi, '')
                                   .replace(/[^a-z0-9]/gi, '-')
                                   .replace(/-{2,}/g, '-');
                $('#slug').val(slug); 
            }
        }
    });

    // Confirm upload to main album if none selected
    $("#submitMedia").click(function() {
        var album = $("#albumid").val(); // Ensure your mediacat widget has id="albumid"
        if(album == '0' || album == ''){
            return confirm("Files will be Uploaded to MAIN Album?");
        }
        return true;
    });
});
</script>
{% endblock %}
